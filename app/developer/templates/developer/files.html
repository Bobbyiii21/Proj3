{% extends 'base.html' %}
{% block content %}
{% load static %}

<!--<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">-->


<div class="p-3 mt-4">
  <div class="container">
    <div class="row justify-content-center">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h3 class="section-header mb-0">Files</h3>
          <button type="button" class="btn-site" data-bs-toggle="modal" data-bs-target="#addFileModal">+ New File</button>
        </div>
        <hr>
        {% for file in template_data.files %}
        <div class="card mb-2">
          <button class="card-header d-flex justify-content-between align-items-center w-100 border-0 bg-transparent text-start"
               data-bs-toggle="collapse"
               data-bs-target="#file-{{ forloop.counter }}"
               aria-expanded="false"
               aria-controls="file-{{ forloop.counter }}">
            <span class="file-name">{{ file.name }}</span>
            <span class="material-symbols-outlined">expand_more</span>
          </button>
          <div class="collapse" id="file-{{ forloop.counter }}">
            <div class="card-body" id="files">
              <p><strong>Description:</strong> <br>
                {{ file.description }}</p>
              <p><strong>Upload Info:</strong> <br>
                 {{ file.date_added }} by {{ file.uploader }}</p>
              <a href="{{ file.file.url }}" download class="btn-site d-inline-flex align-items-center gap-1 mt-1">
                <span class="material-symbols-outlined" style="font-size:1rem;">download</span>
                Download
              </a>
            </div>
          </div>
        </div>
        {% endfor %}
    </div>
  </div>
</div>



<div class="modal fade" id="addFileModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="addFileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3" style="display:none;">
          <textarea class="form-control" name="subfield">file_add</textarea>
          <input type="hidden" name="id" id="edit-experience-id" value="">
        </div>
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="editExperienceModalLabel"><strong>Add File</strong></h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="edit-name" class="form-label">Name*</label>
            <textarea class="form-control" id="edit-name" name="name" rows="2" maxlength="255" required></textarea>
          </div>
          <div class="mb-3">
            <label for="edit-description" class="form-label">Description</label>
            <textarea class="form-control" id="edit-description" name="description" rows="5" maxlength="1023"></textarea>
          </div>
          <div class="mb-3">
            <input type="file" name="file_upload" required/>
            <label for="file_upload" class="btn">Upload File</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-hover-btn" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="primary-hover-btn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
